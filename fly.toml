app = "telegram-hajj-bot"
kill_signal = "SIGINT"
kill_timeout = 5
processes = []

[build]
  builder = "paketobuildpacks/builder:base"
  buildpacks = ["paketo-community/python"]

[build.env]
  PIP_NO_CACHE_DIR = "1"
  PIP_DISABLE_PIP_VERSION_CHECK = "1"

[run]
  command = "gunicorn --bind 0.0.0.0:3000 --workers 2 wsgi:app"

[[services]]
  http_checks = []
  internal_port = 3000
  processes = ["app"]
  protocol = "tcp"
  script_checks = []

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 3000

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"

